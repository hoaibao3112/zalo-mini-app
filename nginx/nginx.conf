user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" "$http_x_correlation_id"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  # Gzip Compression
  gzip on;
  gzip_disable "msie6";
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # Load Balancing Upstream
  upstream backend_servers {
    least_conn;
    server backend-1:5000 max_fails=3 fail_timeout=30s;
    server backend-2:5000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # Rate Limiting Configurations (Fix 6)
  # 30 reqs/giây cho các API chung, định danh theo IP của khách hàng
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  
  # 5 reqs/phút cho luồng xác thực Zalo Đăng nhập (phòng spam)
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
  
  # 10 reqs/phút cho lượt quay game (phòng spam brute force phần thưởng)
  limit_req_zone $binary_remote_addr zone=spin:10m rate=10r/m;

  # HTTP - Redirect to HTTPS
  server {
    listen 80;
    server_name localhost; # Có thể thay bằng domain của bạn khi deploy thực tế

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS Configuration
  server {
    listen 443 ssl http2; # Tương thích ngược http2 (dành cho cả nginx < 1.25.1)
    
    # ⚠️ KHI DEPLOY PRODUCTION: Thay 'localhost' bằng tên domain thực tế của bạn
    # Ví dụ: server_name mini-app.yourcompany.vn www.mini-app.yourcompany.vn;
    server_name localhost; 

    # ⚠️ KHI DEPLOY PRODUCTION: Thay đổi đường dẫn SSL certs tương ứng với domain của bạn
    # Ví dụ: /etc/letsencrypt/live/mini-app.yourcompany.vn/fullchain.pem;
    ssl_certificate /etc/letsencrypt/live/localhost/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/localhost/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Edge Security Headers (Fix 6)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Timeouts Config
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # API Proxy Routing
    location / {
      proxy_pass http://backend_servers;
      proxy_http_version 1.1;
      
      # Headers cần thiết cho WebSockets & Load Balancing
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # Truyền correlation-id cho backend tracing logs
      proxy_set_header X-Correlation-ID $http_x_correlation_id;
      
      proxy_cache_bypass $http_upgrade;

      # Áp dụng Rate Limiting Api Chung
      limit_req zone=api burst=50 nodelay;
      limit_req_status 429;
    }

    # API Proxy Routing cho Đăng nhập Zalo
    location ~ ^/api/t/[^/]+/customers/auth/ {
      proxy_pass http://backend_servers;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Correlation-ID $http_x_correlation_id;
      proxy_cache_bypass $http_upgrade;

      # Áp dụng Rate Limiting Auth
      limit_req zone=auth burst=10 nodelay;
      limit_req_status 429;
    }

    # API Proxy Routing cho Luồng Quay Thưởng Game (Gamification)
    location ~ ^/api/t/[^/]+/spin-games/[^/]+/spin$ {
      proxy_pass http://backend_servers;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Correlation-ID $http_x_correlation_id;
      proxy_cache_bypass $http_upgrade;

      # Áp dụng Rate Limiting Spin Game
      limit_req zone=spin burst=5 nodelay;
      limit_req_status 429;
    }
  }
}
